<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ความทรงจำวัยเรียน</title>
<style>
body {
    margin: 0;
    font-family: "Prompt", sans-serif;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

#home {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

button {
    padding: 20px 40px;
    font-size: 24px;
    border: none;
    border-radius: 50px;
    background: white;
    color: #203a43;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

#gallery {
    display: none;
    padding: 50px;
}

img {
    width: 250px;
    margin: 15px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

img:hover {
    transform: scale(1.05);
}

/* กล่องดูรูปเต็มจอ */
#modal {
    display: none;
    position: fixed;
    z-index: 1000;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
}

#modal img {
    width: 70%;
    max-width: 800px;
}

#close {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="home">
    <h1>ย้อนเวลาไปหาความทรงจำ</h1>
    <button onclick="goToMemory()">ย้อนเวลา ⏳</button>
</div>

<div id="gallery">
    <h1>ความทรงจำวัยเรียนของเรา</h1>

    <img src="1.jpg" onclick="openModal(this.src)">
    <img src="2.jpg" onclick="openModal(this.src)">
    <img src="3.jpg" onclick="openModal(this.src)">
    <img src="4.jpg" onclick="openModal(this.src)">
    <img src="5.jpg" onclick="openModal(this.src)">
    <img src="6.jpg" onclick="openModal(this.src)">
    <img src="7.jpg" onclick="openModal(this.src)">
    <img src="8.jpg" onclick="openModal(this.src)">
    <img src="9.jpg" onclick="openModal(this.src)">
    <img src="10.jpg" onclick="openModal(this.src)">
    <img src="11.jpg" onclick="openModal(this.src)">
    <img src="12.jpg" onclick="openModal(this.src)">
    <img src="13.jpg" onclick="openModal(this.src)">
    <img src="14.jpg" onclick="openModal(this.src)">
    <img src="15.jpg" onclick="openModal(this.src)">
    <img src="16.jpg" onclick="openModal(this.src)">
    <img src="17.jpg" onclick="openModal(this.src)">
</div>

<!-- กล่องดูรูป -->
<div id="modal" onclick="closeModal()">
    <span id="close">&times;</span>
    <img id="modalImg">
</div>

<audio id="bgmusic" src="memory.mp3"></audio>

<script>
function goToMemory() {
    document.getElementById("home").style.display = "none";
    document.getElementById("gallery").style.display = "block";
    document.getElementById("bgmusic").play();
}

function openModal(src) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("modalImg").src = src;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
